name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Build native binaries for each platform ─────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            arch: x64
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            arch: arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      - name: Build Rust (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build Rust (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          cargo install cross
          cross build --release --target ${{ matrix.target }}

      - name: Build napi module
        run: napi build --platform --release --target ${{ matrix.target }}
        working-directory: ./crates/napi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.target }}
          path: crates/napi/*.node

  # ─── Test on each platform ────────────────────────────────────────
  test:
    name: Test ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-action@stable
      - name: Download prebuilds
        uses: actions/download-artifact@v4
        with:
          path: npm/prebuilds
          pattern: prebuild-*
          merge-multiple: true
      - name: Run tests
        run: |
          cd npm
          npm install
          npm test

  # ─── Publish npm + cargo + GitHub Release ───────────────────────
  publish:
    name: Publish
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          path: npm/prebuilds
          pattern: prebuild-*
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish npm
        run: |
          cd npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cargo
        run: cargo publish --token ${{ secrets.CARGO_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: npm/prebuilds/**/*.node
          generate_release_notes: true
